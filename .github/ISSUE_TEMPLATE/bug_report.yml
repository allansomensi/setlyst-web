name: Bug Report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can to help us reproduce and fix it. 🛠️

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open the dashboard
        2. Click on "Setlists"
        3. Try to reorder a song
        4. See error...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device
      description: What device were you using? (especially relevant for Live Mode issues)
      placeholder: e.g. iPad Pro, Samsung Galaxy S23, MacBook Pro
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser and version were you using?
      placeholder: e.g. Safari iOS, Chrome Desktop v124
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. iOS 17.4, Windows 11, Android 14
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Browser Console / API Errors
      description: Paste any relevant errors from the browser console (F12) or Network tab.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Is this happening only in Live Mode? Is it a layout issue? Any specific setlist/song?
    validations:
      required: false
