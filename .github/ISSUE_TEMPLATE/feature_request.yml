name: Feature Request
description: Suggest a new feature or improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check the [open issues](../../issues) to see if this has already been requested. ✨

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Setlist Management (creation, reordering)
        - Song & Artist Database
        - Live Mode (performance viewer)
        - Lyrics & ChordPro Rendering
        - Authentication & User Profile
        - i18n (Localization)
        - UI / UX / Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see implemented? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches or workarounds you've thought about?
    validations:
      required: false

  - type: input
    id: platform
    attributes:
      label: Target Device / Browser
      description: If this applies to Live Mode or UI, specify the intended device or browser.
      placeholder: e.g. iPad, Android Tablet, Mobile Chrome
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, UI mockups, links, or anything else relevant.
    validations:
      required: false
